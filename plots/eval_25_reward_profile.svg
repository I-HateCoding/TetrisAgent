<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <style>
    .bg { fill: #ffffff; }
    .grid { stroke: #bfc7d1; stroke-width: 1.5; stroke-dasharray: 8 8; opacity: 0.6; }
    .axis { stroke: #111111; stroke-width: 2.5; }
    .bar1 { fill: #2f79ad; }
    .bar2 { fill: #4c95c4; }
    .bar3 { fill: #79afd8; }
    .bar4 { fill: #adcfe8; }
    .title { font: 700 38px 'Segoe UI', Arial, sans-serif; fill: #111111; }
    .label { font: 18px 'Segoe UI', Arial, sans-serif; fill: #111111; }
    .tick { font: 15px 'Segoe UI', Arial, sans-serif; fill: #111111; }
    .value { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #111111; }
    .note { font: 16px 'Segoe UI', Arial, sans-serif; fill: #4b5563; }
  </style>
  <rect class="bg" x="0" y="0" width="1600" height="980"/>
  <text class="title" x="800" y="70" text-anchor="middle">Reward Stability Profile</text>
  <text class="note" x="800" y="102" text-anchor="middle">Looking beyond the best episode: mean, median, lower quartile and worst-case reward</text>

  <line class="grid" x1="140" y1="820" x2="1500" y2="820"/>
  <line class="grid" x1="140" y1="690" x2="1500" y2="690"/>
  <line class="grid" x1="140" y1="560" x2="1500" y2="560"/>
  <line class="grid" x1="140" y1="430" x2="1500" y2="430"/>
  <line class="grid" x1="140" y1="300" x2="1500" y2="300"/>
  <line class="grid" x1="140" y1="170" x2="1500" y2="170"/>

  <line class="axis" x1="140" y1="820" x2="1500" y2="820"/>
  <line class="axis" x1="140" y1="120" x2="140" y2="820"/>

  <text class="tick" x="95" y="825">0</text>
  <text class="tick" x="45" y="695">20k</text>
  <text class="tick" x="45" y="565">40k</text>
  <text class="tick" x="45" y="435">60k</text>
  <text class="tick" x="45" y="305">80k</text>
  <text class="tick" x="36" y="175">100k</text>

  <rect class="bar1" x="240" y="141.8" width="220" height="678.2"/>
  <rect class="bar2" x="560" y="365.1" width="220" height="454.9"/>
  <rect class="bar3" x="880" y="639.9" width="220" height="180.1"/>
  <rect class="bar4" x="1200" y="799.9" width="220" height="20.1"/>

  <text class="value" x="350" y="126" text-anchor="middle">96,881</text>
  <text class="value" x="670" y="349" text-anchor="middle">64,986</text>
  <text class="value" x="990" y="624" text-anchor="middle">25,730</text>
  <text class="value" x="1310" y="784" text-anchor="middle">2,874</text>

  <text class="label" x="350" y="870" text-anchor="middle">Average</text>
  <text class="label" x="670" y="870" text-anchor="middle">Median</text>
  <text class="label" x="990" y="870" text-anchor="middle">P25</text>
  <text class="label" x="1310" y="870" text-anchor="middle">Worst</text>

  <text class="note" x="230" y="925">The gap between average and P25 shows that a few strong episodes lift the mean, while lower-quartile performance is still much lower.</text>
  <text class="note" x="230" y="950">This is why `P25 reward` and `Worst reward` are useful when discussing stability in the report.</text>
</svg>
