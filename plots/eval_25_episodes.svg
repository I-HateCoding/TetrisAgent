    .steps-dot { fill: #4c95c4; }
    .title { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #111111; }
    .subtitle { font: 15px 'Segoe UI', Arial, sans-serif; fill: #4b5563; }
    .label { font: 14px 'Segoe UI', Arial, sans-serif; fill: #111111; }
